# RX 7800 XT (gfx1101, 16 GB) — reference card for this repo.
# Tested on ROCm 7.1.52802, torch 2.9.1+rocm7.1.1, torchao 0.14.1, diffusers 0.37.1.
# Reference bench (single GPU, FLUX.1-dev 1024² × 28 steps, bf16 int8):
#   - 72.5 s total / 6.39 GB peak VRAM

name: rx_7800_xt
arch: gfx1101
dtype: bfloat16
quantize: true               # int8 weight-only via torchao Int8WeightOnlyConfig
offload: group_offload_stream_record
num_blocks_per_group: 8      # 8 transformer blocks per offload group
notes: |
  Fastest low-VRAM config at 16 GB budget. For 16 GB users who want slightly
  faster inference at the cost of more VRAM, switch to offload: model_cpu_offload
  and dtype: float16 (75 s / 12.57 GB).
