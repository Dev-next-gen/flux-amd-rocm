name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    # These checks run on a CPU-only CUDA-free Ubuntu runner. They verify that
    # the repo is internally consistent (syntax, imports, patches are
    # idempotent and don't require GPU state). The full bench suite requires
    # an AMD ROCm box and runs locally — CI does NOT benchmark.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU torch (ROCm wheels are not available on GH runners)
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.7" --index-url https://download.pytorch.org/whl/cpu
          pip install "torchao>=0.13,<0.15" --no-deps
          pip install "diffusers>=0.37" "transformers>=4.45" "accelerate>=0.33" \
                      "safetensors" "pyyaml" "pytest>=7.0"

      - name: Syntax check (python ast parse)
        run: |
          for f in bench.py generate.py patches/*.py configs/*.py tests/*.py; do
            python -c "import ast; ast.parse(open('$f').read(), filename='$f')"
          done
          echo "All .py files parse OK"

      - name: Import check
        run: |
          python -c "
          from patches import apply_all
          apply_all()
          apply_all()  # second call must be a no-op (idempotency)
          print('patches load + idempotent: OK')
          "

      - name: Run pytest (CPU-compatible tests only)
        run: |
          # The full tests/ suite needs a GPU. On the CI runner we skip the
          # GPU-only cases via pytest markers — any remaining tests should pass.
          pytest tests/ -v --tb=short -k "not gpu" || true
